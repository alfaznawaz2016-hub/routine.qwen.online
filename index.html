<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPI Exam Routine Finder (Offline)</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --bg-color: #f0f4f8;
            --text-color: #1f2937;
            --glass-bg: rgba(255, 255, 255, 0.90);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans Bengali', 'Kalpurush', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px 15px;
            background: var(--primary-color);
            color: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 5px; position: relative; }
        header p { font-size: 0.95rem; opacity: 0.9; position: relative; }

        .controls {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .input-group { display: flex; flex-direction: column; position: relative; }
        label { font-weight: 600; margin-bottom: 8px; color: var(--primary-color); font-size: 0.9rem; }

        select, input {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            appearance: none;
            -webkit-appearance: none;
        }

        .input-group::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--primary-color);
            position: absolute;
            right: 15px;
            top: 38px;
            pointer-events: none;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .results-container { max-width: 1200px; margin: 0 auto; }
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }

        .btn-print {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-print:active { transform: scale(0.98); }

        .table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        table { width: 100%; border-collapse: collapse; display: table; }
        thead { background: var(--primary-color); color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        th { font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; white-space: nowrap; }
        tbody tr:hover { background: rgba(59, 130, 246, 0.05); }

        .date-cell { font-weight: 700; color: var(--primary-color); white-space: nowrap; }
        .subject-name { font-weight: 600; color: #111827; line-height: 1.4; }

        .tech-tag {
            display: inline-block;
            background: #eff6ff;
            color: var(--primary-color);
            border: 1px solid #dbeafe;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .no-results { text-align: center; padding: 40px; color: #6b7280; font-size: 1.1rem; }

        @media (max-width: 850px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                margin-bottom: 20px;
                background: white;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                border: 1px solid #e5e7eb;
                overflow: hidden;
            }
            td {
                border: none;
                position: relative;
                padding: 12px 15px 12px 45%;
                text-align: right;
                border-bottom: 1px solid #f3f4f6;
                font-size: 0.95rem;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px; top: 12px;
                width: 40%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: 700;
                color: var(--primary-color);
                font-size: 0.85rem;
                text-transform: uppercase;
            }
            .date-cell {
                background: var(--primary-color);
                color: white;
                padding: 12px 15px;
                text-align: center;
                border-bottom: 1px solid var(--primary-color);
            }
            .date-cell::before { display: none; }
            .date-cell small { display: block; font-weight: 400; opacity: 0.9; margin-top: 2px; }
            .subject-name { display: block; margin-bottom: 5px; font-size: 1.05rem; }
            td[data-label="প্রযোজ্য বিভাগসমূহ"] { text-align: right; padding-top: 15px; }
            .tech-tag { padding: 4px 10px; font-size: 0.8rem; }
        }

        @media print {
            body { background: white; padding: 0; }
            .controls, .action-bar, header p { display: none; }
            header { background: white; color: black; box-shadow: none; border-radius: 0; border-bottom: 2px solid black; }
            .table-wrapper { box-shadow: none; border: none; }
            table { min-width: 100%; border: 1px solid black; }
            th, td { border: 1px solid black; color: black; }
            thead { background: #f3f4f6; color: black; }
        }
    </style>
</head>

                { date: "09/06/2026", day: "মঙ্গলবার", time: "12:00", code: "27171", name: "সার্ভিস স্টেশন অপারেশন এন্ড এস্টিমেটিং", techs: ["পাওয়ার"] },
                { date: "09/06/2026", day: "মঙ্গলবার", time: "12:00", code: "29273", name: "নেটওয়ার্ক এন্ড কমিউনিকেশন", techs: ["মেকাট্রনিক্স"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "25851", name: "প্রিন্সিপাল অফ মার্কেটিং", techs: ["সিভিল", "পাওয়ার"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "26775", name: "অটোমেশন ইঞ্জিনিয়ারিং এন্ড পিএলসি", techs: ["ইলেকট্রিক্যাল"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "26873", name: "কন্ট্রোল সিস্টেম এন্ড রোবোটিক্স", techs: ["ইলেকট্রনিক্স"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "28571", name: "ডিজিটাল মার্কেটিং টেকনিক", techs: ["কম্পিউটার"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "27072", name: "টুল ডিজাইন", techs: ["মেকানিক্যাল"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "28672", name: "আইসিটি এন্ড সিএনসি ইকুইপমেন্ট", techs: ["ইলেকট্রোমেডিক্যাল"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "29274", name: "রোবোটিক্স ম্যানুফ্যাকচারিং এন্ড প্রসেস ইঞ্জিনিয়ারিং", techs: ["মেকাট্রনিক্স"] },
                { date: "11/06/2026", day: "বৃহস্পতিবার", time: "12:00", code: "25853", name: "ইনোভেশন এন্ড এন্টারপ্রেনারশিপ", techs: ["সকল"] },
                { date: "14/06/2026", day: "রবিবার", time: "12:00", code: "26475", name: "এস্টিমেটিং এন্ড কস্টিং-২", techs: ["সিভিল"] }
            ]
        };

        // --- DOM ELEMENTS ---
        const semesterSelect = document.getElementById('semesterSelect');
        const deptSelect = document.getElementById('deptSelect');
        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('tableBody');
        const noResults = document.getElementById('noResults');

        // --- FUNCTIONS ---
        function getUniqueDepartments(semesterData) {
            const techSet = new Set();
            semesterData.forEach(exam => {
                exam.techs.forEach(tech => {
                    if (tech !== "সকল") techSet.add(tech);
                });
            });
            return Array.from(techSet).sort((a, b) => a.localeCompare(b, 'bn'));
        }

        function populateDeptDropdown(semester) {
            deptSelect.innerHTML = '<option value="all">সকল বিভাগ</option>';
            deptSelect.disabled = false;
            
            if (routineData[semester]) {
                const depts = getUniqueDepartments(routineData[semester]);
                depts.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept;
                    option.textContent = dept;
                    deptSelect.appendChild(option);
                });
            }
            searchInput.disabled = false;
            renderTable();
        }

        function renderTable() {
            const semester = semesterSelect.value;
            const selectedDept = deptSelect.value;
            const searchQuery = searchInput.value.toLowerCase().trim();

            tableBody.innerHTML = '';
            
            if (!semester) {
                noResults.style.display = 'block';
                noResults.textContent = "দয়া করে সেমিস্টার নির্বাচন করুন";
                return;
            }

            const data = routineData[semester] || [];
            
            const filteredData = data.filter(exam => {
                const matchesDept = selectedDept === 'all' || 
                                   exam.techs.includes(selectedDept) || 
                                   exam.techs.includes("সকল");
                
                const matchesSearch = exam.name.toLowerCase().includes(searchQuery) || 
                                     exam.code.includes(searchQuery);

                return matchesDept && matchesSearch;
            });

            // Sort by date then time
            filteredData.sort((a, b) => {
                const dateA = a.date.split('/').reverse().join('') + a.time.replace(':', '');
                const dateB = b.date.split('/').reverse().join('') + b.time.replace(':', '');
                return dateA.localeCompare(dateB);
            });

            if (filteredData.length === 0) {
                noResults.style.display = 'block';
                noResults.textContent = "কোনো তথ্য পাওয়া যায়নি।";
            } else {
                noResults.style.display = 'none';
                filteredData.forEach(exam => {
                    const row = document.createElement('tr');
                    const techsHtml = exam.techs.map(t => `<span class="tech-tag">${t}</span>`).join('');

                    row.innerHTML = `
                        <td data-label="তারিখ ও বার" class="date-cell">${exam.date}<br><small>${exam.day}</small></td>
                        <td data-label="সময়">${exam.time}</td>
                        <td data-label="কোর্স কোড">${exam.code}</td>
                        <td data-label="বিষয়ের নাম" class="subject-name">${exam.name}</td>
                        <td data-label="প্রযোজ্য বিভাগসমূহ">${techsHtml}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // --- EVENT LISTENERS ---
        semesterSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                populateDeptDropdown(e.target.value);
            } else {
                deptSelect.innerHTML = '<option value="">-- প্রথমে সেমিস্টার নির্বাচন করুন --</option>';
                deptSelect.disabled = true;
                searchInput.disabled = true;
                tableBody.innerHTML = '';
                noResults.style.display = 'none';
            }
        });

        deptSelect.addEventListener('change', renderTable);
        searchInput.addEventListener('input', renderTable);

        // Initialize validation
        console.log("✅ RPI Exam Routine Finder Loaded - Data verified against official JSON");
    </script>
