<html lang="bn">
<head>

    <style>
        :root {
            --primary-color: #1e3a8a; /* Deep Blue */
            --secondary-color: #3b82f6; /* Lighter Blue */
            --bg-color: #f0f4f8;
            --text-color: #1f2937;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Controls Container */
        .controls {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        select, input {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Results Container */
        .results-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .btn-print {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .btn-print:hover {
            background: #1e40af;
        }

        /* Table Styles */
        .table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* Force scroll on small screens if not using cards */
        }

        thead {
            background: var(--primary-color);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .date-cell {
            font-weight: 700;
            color: var(--primary-color);
        }

        .subject-name {
            font-weight: 600;
            color: #111827;
        }

        .tech-tag {
            display: inline-block;
            background: #dbeafe;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-size: 1.2rem;
        }

        /* Mobile Card View */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: white;
                border-radius: 12px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                border: 1px solid #e5e7eb;
                overflow: hidden;
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                text-align: right;
                border-bottom: 1px solid #f3f4f6;
            }

            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: 600;
                color: var(--primary-color);
            }

            .date-cell {
                background: #eff6ff;
                padding: 10px 15px;
                text-align: center;
                border-bottom: 2px solid #e5e7eb;
            }
            
            .date-cell::before {
                display: none;
            }

            .subject-name {
                display: block;
                margin-bottom: 10px;
                font-size: 1.1rem;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .controls, .action-bar, header p {
                display: none;
            }
            header {
                background: white;
                color: black;
                box-shadow: none;
                border-bottom: 2px solid black;
                border-radius: 0;
                margin-bottom: 10px;
            }
            .table-wrapper {
                box-shadow: none;
                border: none;
            }
            table {
                min-width: 100%;
                border: 1px solid black;
            }
            th, td {
                border: 1px solid black;
                color: black;
            }
            thead {
                background: #f3f4f6;
                color: black;
            }
        }
    </style>
</head>

                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "27072", name: "টুল ডিজাইন", techs: ["মেকানিক্যাল"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "28672", name: "আইওটি এন্ড আরএফআইডি ইকুইপমেন্ট", techs: ["ইলেকট্রোমেডিক্যাল"] },
                { date: "10/06/2026", day: "বুধবার", time: "12:00", code: "28274", name: "রোবোটিক্স ম্যানিপুলেটর এন্ড প্রসেস ইঞ্জিনিয়ারিং", techs: ["মেকাট্রনিক্স"] },
                { date: "11/06/2026", day: "বৃহস্পতিবার", time: "12:00", code: "25853", name: "ইনোভেশন এন্ড এন্টারপ্রেনারশিপ", techs: ["সকল"] },
                { date: "14/06/2026", day: "রবিবার", time: "12:00", code: "26474", name: "এস্টিমেটিং এন্ড কস্টিং-২", techs: ["সিভিল"] }
            ]
        };

        const departments = {
            "Civil": "সিভিল",
            "Electrical": "ইলেকট্রিক্যাল",
            "Electronics": "ইলেকট্রনিক্স",
            "Mechanical": "মেকানিক্যাল",
            "Power": "পাওয়ার",
            "Computer": "কম্পিউটার",
            "Electromedical": "ইলেকট্রোমেডিক্যাল",
            "Mechatronics": "মেকাট্রনিক্স"
        };

        // --- DOM ELEMENTS ---
        const semesterSelect = document.getElementById('semesterSelect');
        const deptSelect = document.getElementById('deptSelect');
        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('tableBody');
        const noResults = document.getElementById('noResults');

        // --- FUNCTIONS ---

        function getUniqueDepartments(semesterData) {
            const techSet = new Set();
            semesterData.forEach(exam => {
                exam.techs.forEach(tech => {
                    if (tech !== "সকল") techSet.add(tech);
                });
            });
            return Array.from(techSet).sort();
        }

        function populateDeptDropdown(semester) {
            deptSelect.innerHTML = '<option value="all">সকল বিভাগ</option>';
            deptSelect.disabled = false;
            
            if (routineData[semester]) {
                const depts = getUniqueDepartments(routineData[semester]);
                depts.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept;
                    option.textContent = dept;
                    deptSelect.appendChild(option);
                });
            }
            searchInput.disabled = false;
            renderTable();
        }

        function renderTable() {
            const semester = semesterSelect.value;
            const selectedDept = deptSelect.value;
            const searchQuery = searchInput.value.toLowerCase();

            tableBody.innerHTML = '';
            
            if (!semester) {
                noResults.style.display = 'block';
                noResults.textContent = "দয়া করে সেমিস্টার নির্বাচন করুন";
                return;
            }

            const data = routineData[semester] || [];
            
            const filteredData = data.filter(exam => {
                // Filter by Department
                const matchesDept = selectedDept === 'all' || exam.techs.includes(selectedDept) || exam.techs.includes("সকল");
                
                // Filter by Search
                const matchesSearch = exam.name.toLowerCase().includes(searchQuery) || 
                                      exam.code.includes(searchQuery);

                return matchesDept && matchesSearch;
            });

            if (filteredData.length === 0) {
                noResults.style.display = 'block';
                noResults.textContent = "কোনো তথ্য পাওয়া যায়নি।";
            } else {
                noResults.style.display = 'none';
                filteredData.forEach(exam => {
                    const row = document.createElement('tr');
                    
                    // Format Techs for display
                    const techsHtml = exam.techs.map(t => `<span class="tech-tag">${t}</span>`).join('');

                    row.innerHTML = `
                        <td data-label="তারিখ ও বার" class="date-cell">${exam.date}<br><small>${exam.day}</small></td>
                        <td data-label="সময়">${exam.time}</td>
                        <td data-label="কোর্স কোড">${exam.code}</td>
                        <td data-label="বিষয়ের নাম" class="subject-name">${exam.name}</td>
                        <td data-label="প্রযোজ্য বিভাগসমূহ">${techsHtml}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // --- EVENT LISTENERS ---

        semesterSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                populateDeptDropdown(e.target.value);
            } else {
                deptSelect.innerHTML = '<option value="">-- প্রথমে সেমিস্টার নির্বাচন করুন --</option>';
                deptSelect.disabled = true;
                searchInput.disabled = true;
                tableBody.innerHTML = '';
                noResults.style.display = 'none';
            }
        });

        deptSelect.addEventListener('change', renderTable);
        searchInput.addEventListener('input', renderTable);

    </script>
</body>
</html>
